<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
		<div id="text"></div>
		<script>
			// Store the English and German versions of the text
			var textGerman = `
				<p>Yves Spiri (er) ist ein Musik-Produzent, Sound-Designer und K&uuml;nstler aus Bern. W&auml;hrend seinem Studium in Sound Arts an der Hochschule der K&uuml;nste Bern konnte er seine musikalischen und technischen Kenntnisse weiter festigen und vertiefen Auch er&ouml;ffnete ihm die Besch&auml;ftigen mit Klang im weitesten Sinne, nicht auf Musik beschr&auml;nkt, neue Horizonte f&uuml;r seine Produktionen. Yves besch&auml;ftigt sich am liebsten mit experimentellem Sound-Design, und verarbeitet die daraus enstehenden Kl&auml;nge zu Musikst&uuml;cken. Dabei verfolgt er die Vision, zwei Welten miteinander zu vereinen: Klangkunst und elektronische Musik. Yves pr&auml;sentiert seine St&uuml;cke sowohl live, als auch als DJ eingebunden in Sets. Bisher spielte er in Clubs, Kulturlokale und Internetradios. Kapitel Bern, Coupole Biel, Radio Bollwerk und TRNST Radio, um einige zu nennen.</p>
				<p>In einer Kollaboration mit Candid R&uuml;tter, einem Freund und damaligen Sound Arts Mitstudent, komponierten die beiden das rund zehnmin&uuml;tige, mehrkanalige H&ouml;rst&uuml;ck &ldquo;Lone Fluke&rdquo;.</p>
				<p>Als Bachelor-Abschlussarbeit produzierte Yves eine EP f&uuml;r Tonband, und ver&ouml;ffentlichte diese auf dem damals frisch entstandenen berner Musiklabel &ldquo;CRTTR&rdquo;. Aus CRTTR wurde bald ein interdisziplin&auml;res Kunstkollektiv, bestehend aus Yves und neun weitere K&uuml;nstler*innen.</p>
				<p>Seit dem Absolvieren seines Studiums konnte Yves seine erste Solo-EP &ldquo;Rewire&rdquo; beim in Bristol UK beheimateten Label &ldquo;Nostro Hood System&rdquo; ver&ouml;ffentlichen, und durfte sich &uuml;ber sehr positiven Anklang erfreuen. Die St&uuml;cke wurden auf Bandcamp zahlreich gekauft und in verschiedenen DJ-Radios und Clubs gespielt, f&uuml;r Yves ging damit ein kleiner Traum in erf&uuml;llung.</p>
			`;

			var textEnglish = `
				<p>Yves Spiri (he/him) is a music producer, sound designer, and artist from Bern. During his studies in Sound Arts at the Bern University of the Arts, he was able to further solidify and deepen his musical and technical knowledge. Engaging with sound in the broadest sense, not limited to music, opened up new horizons for his productions. Yves prefers to work with experimental sound design and processes the resulting sounds into musical pieces. He pursues the vision of uniting two worlds: sound art and electronic music. Yves presents his pieces both live and as a DJ integrated into sets. So far, he has performed in clubs, cultural venues, and internet radios such as Kapitel Bern, Coupole Biel, Radio Bollwerk, and TRNST Radio, to name a few.</p>
				<p>In collaboration with Candid Rütter, a friend and former Sound Arts classmate, the two composed the approximately ten-minute, multi-channel sound piece "Lone Fluke."</p>
				<p>For his bachelor's thesis, Yves produced an EP for tape and released it on the then newly established Bernese music label "CRTTR." CRTTR soon became an interdisciplinary art collective, consisting of Yves and nine other artists.</p>
				<p>Since completing his studies, Yves has been able to release his first solo EP "Rewire" on the Bristol-based label "Nostro Hood System," which received very positive feedback. The tracks were widely purchased on Bandcamp and played in various DJ radios and clubs, fulfilling a small dream for Yves.</p>
			`;
		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
		<script src="animation.js"></script>
	</body>
</html>
