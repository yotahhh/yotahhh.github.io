<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
		<div id="text"></div>
		<script>
			// Store the English and German versions of the text
			var textGerman = `
				<p>Yves Spiri ist ein vielseitiger Klangkünstler aus Bern, Schweiz, mit Expertise in Sounddesign, Tontechnik und Musikproduktion. Sein akademischer Hintergrund in Sound Arts an der Hochschule der Künste Bern, kombiniert mit seiner umfangreichen Erfahrung, ermöglicht es ihm, eine einzigartige Mischung aus kreativen und technischen Fähigkeiten anzubieten.</p>
				<p>Yves' Arbeit umfasst ein breites Spektrum an Anwendungen, darunter:</p>
				<ul>
					<li><strong>Sounddesign für Marketing und Werbung:</strong> Er verfügt über eine nachweisliche Erfolgsbilanz bei der Erstellung von wirkungsvollem Sounddesign für Werbespots, insbesondere für Cleverclip, eine renommierte Marketingvideofirma in Bern.</li>
					<li><strong>Audio-Mastering für experimentelle Musik:</strong> Er ist der bevorzugte Mastering-Engineer für den CRTTR Club, eine angesehene zweimonatliche Reihe, die experimentelle Clubmusik präsentiert.</li>
					<li><strong>Maßgeschneidertes Sounddesign und Musikproduktion:</strong> Yves arbeitet mit Künstlern und Kunden zusammen, um maßgeschneiderte Klangerlebnisse zu schaffen, von Soundeffekten und Atmosphären bis hin zu origineller Musik.</li>
				</ul>
			`;

			var textEnglish = `
				<p>Yves Spiri is a versatile sound artist based in Bern, Switzerland, with expertise in sound design, engineering, and music production. His academic background in Sound Arts at the Bern University of the Arts, combined with extensive experience, allows him to offer a unique blend of creative and technical skills.</p>
				<p>Yves' work spans a wide range of applications, including:</p>
				<ul>
					<li><strong>Sound Design for Marketing and Advertising:</strong> He has a proven track record creating impactful sound design for commercials, notably for Cleverclip, a prominent marketing video firm in Bern.</li>
					<li><strong>Audio Mastering for Experimental Music:</strong> He is the go-to mastering engineer for CRTTR Club, a respected bi-monthly series showcasing experimental club music.</li>
					<li><strong>Custom Sound Design and Music Production:</strong> Yves collaborates with artists and clients to create bespoke sonic experiences, from sound effects and atmospheres to original music.</li>
				</ul>
			`;
		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
		<script src="animation.js"></script>
	</body>
</html>
