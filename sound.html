<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
		<div id="text"></div>
		<script>
			var vimeoPlayer = '<iframe src="https://player.vimeo.com/video/722502612?app_id=122963&h=e4ecb67fb0&referrer=https%3A%2F%2Fwww.vitamed-gmbh.ch%2F" width="640" height="360" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>';
			// Store the English and German versions of the text
			var textGerman = `
				<p>Yves Spiri ist ein Klangkünstler aus Bern, Schweiz, der gerne mit Sounddesign, Technik und Musikproduktion arbeitet. Er hat Sound Arts an der Hochschule der Künste Bern studiert und arbeitet stets an Projekten, die Kreativität und technisches Know-how kombinieren.</p>
				<p>Yves' Arbeit umfasst:</p>
				<ul>
					<li><strong>Sounddesign für Marketing und Werbung:</strong> Er kreiert eindrucksvolle Klänge für Werbespots, einschließlich Arbeiten für Cleverclip, eine bekannte Marketing-Video-Firma in Bern.</li>
					<li><strong>Audio-Mastering für experimentelle Musik:</strong> Er ist der bevorzugte Mastering-Ingenieur für den CRTTR Club, eine zweiwöchentliche Veranstaltung, die experimentelle Clubmusik präsentiert.</li>
					<li><strong>Maßgeschneidertes Sounddesign und Musikproduktion:</strong> Yves arbeitet mit Künstlern und Kunden zusammen, um einzigartige Klangerlebnisse zu schaffen, von Soundeffekten und Atmosphären bis hin zu Originalmusik.</li>
				</ul>
				<p>Yves ist für alle Arten von Projekten im Bereich Sounddesign und Komposition verfügbar. Sie können ihn per E-Mail erreichen.</p>
				<li><a href="mailto:hi@yvesspiri.net"><i class="fa-regular fa-envelope"></i></a></li>

				Here is one of the video clips that Yves has worked on:
				${vimeoPlayer}
			`;
			var textEnglish = `
				<p>Yves Spiri is a sound artist from Bern, Switzerland, who loves working with sound design, engineering, and music production. He studied Sound Arts at the Bern University of the Arts and has built a career combining creativity and technical know-how.</p>
				<p>Yves' work includes:</p>
				<ul>
					<li><strong>Sound Design for Marketing and Advertising:</strong> He creates impactful sounds for commercials, including work for Cleverclip, a well-known marketing video firm in Bern.</li>
					<li><strong>Audio Mastering for Experimental Music:</strong> He is the go-to mastering engineer for CRTTR Club, a bi-monthly event that features experimental club music.</li>
					<li><strong>Custom Sound Design and Music Production:</strong> Yves works with artists and clients to make unique sound experiences, from sound effects and atmospheres to original music.</li>
				/ul>
				<p>Yves is available for all kinds of projects involving sound design and composition. You can reach him via email.</p>
				<li><a href="mailto:hi@yvesspiri.net"><i class="fa-regular fa-envelope"></i></a></li>

				Hier ist einer der Videoclips, an denen Yves gearbeitet hat:
				${vimeoPlayer}
			`;		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
		<script src="animation.js"></script>
	</body>
</html>
