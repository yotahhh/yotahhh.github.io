<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<div id="text"></div>
		<script>
			// Store the English and German versions of the text
			var textGerman = `
				<p>Ich mache Sound Design für Filme, Theaterstücke, Werbevideos, Jingles, Games. Hier einige Beispiele:</p>
			`;

			var textEnglish = `
				<p>I do sound design for movies, plays, commercials, jingles, games. Here are some examples:</p>
			`;
		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
		<script src="animation.js"></script>
	</body>
</html>
