<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
		<div id="text"></div>
		<script>
			// Store the English and German versions of the text
			var textGerman = `
			`;

			var textEnglish = `
				<p>Music/Works</p>
			`;
		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
        <div class="grid-container">
            <div class="grid-item" onclick="loadPlayer('lone_fluke')">
				<figure>
					<img src="covers/lone_fluke.jpg" alt="Lone Fluke">
					<figcaption>Lone Fluke</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('is_like')">
				<figure>
					<img src="covers/is_like.jpg" alt="Is Like">
					<figcaption>Is Like</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('album3')">
				<figure>
					<img src="path/to/album3.jpg" alt="Album 3 Cover Art">
					<figcaption>Album 3 Cover Art</figcaption>
				</figure>
			</div>
        </div>
        
        <div>
            <div id="player"></div>
        </div>
        
        <script>
            var currentAlbum = null;

            function loadPlayer(album) {
                var text, embed;
                if (album === currentAlbum) {
                    document.getElementById('player').style.display = "none";
                    currentAlbum = null;
                    return;
                }

                if (album === 'lone_fluke') {
                    text = "In collaboration with Candid Rütter, a friend and former Sound Arts classmate, the two composed the approximately ten-minute, multi-channel sound piece \"Lone Fluke\" + album";
                    embed = '<iframe width="500" height="150" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/971118847%3Fsecret_token%3Ds-RwepXlcAmVq&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>';
                } else if (album === 'is_like') {
                    text = "Is Like blabla";
                    embed = '<iframe width="500" height="150" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1707411753&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>';
                } else if (album === 'album3') {
                    text = "Album 3 blabla";
                    embed = '<iframe width="500" height="150" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1707411753&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>';
                }

                document.getElementById('player').innerHTML = '<div>' + text + '</div><div>' + embed + '</div>';
    			document.getElementById('player').style.display = "block";
    			document.getElementById('player').style.visibility = 'visible';
    			currentAlbum = album;
            }
        </script>
		<script src="animation.js"></script>
	</body>
</html>
