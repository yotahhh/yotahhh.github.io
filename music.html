<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
		<div id="text"></div>
		<script>
			// Store the English and German versions of the text
			var textGerman = `
			`;

			var textEnglish = `
				<p>Yves Spiri (he/him) is a music producer, sound designer, and artist from Bern. During his studies in Sound Arts at the Bern University of the Arts, he was able to further solidify and deepen his musical and technical knowledge. Engaging with sound in the broadest sense, not limited to music, opened up new horizons for his productions. Yves prefers to work with experimental sound design and processes the resulting sounds into musical pieces. He pursues the vision of uniting two worlds: sound art and electronic music. Yves presents his pieces both live and as a DJ integrated into sets. So far, he has performed in clubs, cultural venues, and internet radios such as Kapitel Bern, Coupole Biel, Radio Bollwerk, and TRNST Radio, to name a few.</p>
				<p>In collaboration with Candid Rütter, a friend and former Sound Arts classmate, the two composed the approximately ten-minute, multi-channel sound piece "Lone Fluke."</p>
				<p>For his bachelor's thesis, Yves produced an EP for tape and released it on the then newly established Bernese music label "CRTTR." CRTTR soon became an interdisciplinary art collective, consisting of Yves and nine other artists.</p>
				<p>Since completing his studies, Yves has been able to release his first solo EP "Rewire" on the Bristol-based label "Nostro Hood System," which received very positive feedback. The tracks were widely purchased on Bandcamp and played in various DJ radios and clubs, fulfilling a small dream for Yves.</p>
			`;
		
			// Get the user's language
			var userLanguage = navigator.language || navigator.userLanguage;
		
			// Decide which version of the text to display
			var textToDisplay = userLanguage.startsWith('de') ? textGerman : textEnglish;
		
			// Display the text
			document.getElementById('text').innerHTML = textToDisplay;
		</script>
        <div class="grid-container">
            <div class="grid-item" onclick="loadPlayer('lone_fluke')">
                <img src="covers/lone_fluke.jpg" alt="Lone Fluke">
            </div>
            <div class="grid-item" onclick="loadPlayer('is_like')">
                <img src="covers/is_like.jpg" alt="Is Like">
            </div>
            <div class="grid-item" onclick="loadPlayer('album3')">
                <img src="path/to/album3.jpg" alt="Album 3 Cover Art">
            </div>
        </div>
        
        <div>
            <div id="player"></div>
        </div>
        
        <script>
            function loadPlayer(lone_fluke) {
                var text = "In collaboration with Candid Rütter, a friend and former Sound Arts classmate, the two composed the approximately ten-minute, multi-channel sound piece \"Lone Fluke\" + album";
                var embed = '<iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/971118847%3Fsecret_token%3Ds-RwepXlcAmVq&color=%2346595d&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>';
                document.getElementById('player').innerHTML = text + embed;
                document.getElementById('player').style.display = "block";
            }
        </script>
        <script>
            function loadPlayer(is_like) {
                var text = "Is Like blabla";
                var embed = '<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1707411753&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>';
                document.getElementById('player').innerHTML = text + embed;
                document.getElementById('player').style.display = "block";
            }
        </script>
		<script src="animation.js"></script>
	</body>
</html>
