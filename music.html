<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="https://kit.fontawesome.com/bac5b34032.js" crossorigin="anonymous"></script>
		<link rel="icon" href="favicon.ico">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<canvas id="backArrow" width="50" height="50" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); cursor: pointer; width: 50px; height: 50px;"></canvas>
			<script>
				var canvas2 = document.getElementById('backArrow');
				var ctx2 = canvas2.getContext('2d');

				// Draw the arrow
				ctx2.beginPath();
				ctx2.moveTo(30, 10);
				ctx2.lineTo(10, 25);
				ctx2.lineTo(30, 40);
				ctx2.strokeStyle = '#000000';
				ctx2.lineWidth = 2;
				ctx2.stroke();

				// Add the click event
				canvas2.addEventListener('click', function() {
					window.history.back();
				});
			</script>
        <div class="grid-container">
            <div class="grid-item" onclick="loadPlayer('lone_fluke')">
				<figure>
					<img src="covers/lone_fluke.jpg" alt="Lone Fluke">
					<figcaption>Lone Fluke</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('is_like')">
				<figure>
					<img src="covers/is_like.jpg" alt="Is Like">
					<figcaption>Is Like</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('lidar')">
				<figure>
					<img src="covers/lidar.jpg" alt="LiDAR">
					<figcaption>LiDAR</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('rewiring')">
				<figure>
					<img src="covers/rewiring.jpg" alt="Rewiring">
					<figcaption>Rewiring</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('momentum')">
				<figure>
					<img src="covers/momentum.jpg" alt="Momentum">
					<figcaption>Momentum</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('trnstn')">
				<figure>
					<img src="covers/trnstn.jpg" alt="TRNSTN">
					<figcaption>TRNSTN Radio</figcaption>
				</figure>
			</div>
			<div class="grid-item" onclick="loadPlayer('this_is_fine')">
				<figure>
					<img src="covers/this_is_fine.jpg" alt="TRNSTN">
					<figcaption>This is Fine</figcaption>
				</figure>
			</div>
        </div>
        
		<div id="player-container"></div>
            <div id="player"></div>
			</div>
        </div>
        
        <script>
			var currentAlbum = null;
			var widget = null;
		
			function loadPlayer(album) {
				var playerContainer = document.getElementById('player-container');
				var text, embed;

				if (album === currentAlbum) {
					playerContainer.classList.remove('active');
					currentAlbum = null;
					return;
				}

				if (album === 'lone_fluke') {
					text = "In collaboration with Candid Rütter, a friend and former Sound Arts Studies classmate, the two composed the approximately ten-minute, multi-channel sound piece \"Lone Fluke\" + album";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/971118847%3Fsecret_token%3Ds-RwepXlcAmVq&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>';
				} else if (album === 'is_like') {
					text = "The thrack \"Is Like\" appeared on the first iteration of CRTTR-CLB, a bi-monthly compilation series by the label and art collective CRTTR";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1707411753&color=%23ff5500&inverse=false&auto_play=true&show_user=false"></iframe>';
				} else if (album === 'lidar') {
					text = "\"LiDAR\" EP is a collaboration with Voicheck. After experiencing numerous collective moments on dance floors, Yotah and Voicheck were inspired to share their own take on bass music. Blending fast-paced rhythms with gritty basslines and a touch of experimental sound design, 'LiDAR' carries a heavy, yet playful energy, originating from their deep-rooted friendship.";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1791667282&color=%23ff5500&inverse=false&auto_play=true&show_user=true"></iframe>';
				} else if (album === 'rewiring') {
					text = "\"Rewiring\" EP was Yotah's debut released on Nostro Hood System, a label based in Bristol UK: NHS's twentieth release introduces a newcomer, Yotah, with their debut EP \"Rewiring,\" showcasing four tracks blending chunky maximalism and intricate modulation. Yotah's creative process involved learning and unlearning various music styles, resulting in a sound that echoes past patterns reinterpreted and rewired in his mind. \"Rewiring\" delves into hybridized sonics, breaking through consolidated patterns to explore the unknown, reflecting Yotah's evolving musical journey.";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1791667282&color=%23ff5500&inverse=false&auto_play=true&show_user=true"></iframe>';
				} else if (album === 'momentum') {
					text = "\"Momentum\" is Yotah's contribution to the VA Compilation by 00effort, a label based in Warsaw, Poland";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1651393896&color=%23ff5500&inverse=false&auto_play=true&show_user=true"></iframe>';
				} else if (album === 'trnstn') {
					text = "\"Crying on the Dancefloor\" was a show on TRNSTN Radio, a radio station based in Fribourg, Switzerland, for which Yotah played a 20 minutes long set consisting of his own tracks";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1393563850&color=%23ff5500&inverse=false&auto_play=true&show_user=true"></iframe>';
				} else if (album === 'this_is_fine') {
					text = "\"This is Fine\" is a Yotah's contribution to the second VA Compilation by label and art collective CRTTR, \"I Wanna Be A Superstar Vol. 2\" ";
					embed = '<iframe width="100%" height="20" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1626788817&color=%23ff5500&inverse=false&auto_play=true&show_user=true"></iframe>';
				}

				document.getElementById('player').innerHTML = '<div class="player-content"><div class="description">' + text + '</div><div class="player">' + embed + '</div></div>';
				// Create a widget instance
				widget = SC.Widget(document.querySelector('.player iframe'));
				playerContainer.classList.add('active');

				currentAlbum = album;
			}
		</script>
		<script src="animation.js"></script>
		<script src="https://w.soundcloud.com/player/api.js"></script>
	</body>
</html>
