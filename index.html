<!DOCTYPE html>
<html>
<head>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: 'Helvetica', sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			color: black;
			text-align: center; /* Center all the text */
		}
		#canvas {
			position: absolute;
			top: 0;
			left: 0;
		}
		h1 {
			font-size: 3em;
		}
		ul {
			list-style-type: none;
			padding: 0;
		}
		ul li {
			margin: 1em 0;
		}
		ul li a {
			color: black;
			text-decoration: none;
		}
		ul li a:hover {
			color: orange; /* Make links appear orange when hovered over */
		}
	</style>
</head>
<body>
	<canvas id="canvas"></canvas>
	<div>
		<h1>Yves Spiri</h1>
		<ul>
			<li><a href="#">Bio</a></li>
			<li><a href="#">Music</a></li>
			<li><a href="#">Sound Design/Engineering</a></li>
			<li><a href="#">Web Design/Tech Support</a></li>
		</ul>
	</div>
	<script src="animation.js"></script>
</body>
</html>
